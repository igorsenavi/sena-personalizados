<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sena Personalizados</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{--cor:#830064;--cor2:#a1007b;--bg:#f6f7fb;--txt:#23232b;--muted:#6b7280;--b:#e9e9ef}
*{box-sizing:border-box}
body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt)}

.header{position:sticky;top:0;z-index:20;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;box-shadow:0 6px 20px rgba(0,0,0,.05)}
.logo{height:46px}
.actions{display:flex;gap:14px}

.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--b);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon{width:22px}

.hero{margin:18px 22px 0;background:linear-gradient(90deg,var(--cor),var(--cor2));color:#fff;border-radius:22px;padding:20px;text-align:center}
.hero h1{margin:0;font-size:26px}

.topbar{padding:18px 22px}
.search-wrap{background:#fff;border:1px solid var(--b);border-radius:16px;padding:12px;display:flex;gap:10px}
.search-wrap input{border:none;outline:none;width:100%}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:20px}
.card{background:#fff;border:1px solid var(--b);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:8px}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:14px;background:#eee}
.price{font-size:20px;font-weight:700;color:var(--cor)}

.qty-box{display:flex;align-items:center;gap:8px}
.qty-box button{width:28px;height:28px;border:none;background:#eee;border-radius:6px}

.primary{background:var(--cor);color:white;border:none;padding:10px;border-radius:10px;cursor:pointer}
.secondary{background:white;border:1px solid var(--cor);color:var(--cor);padding:10px;border-radius:10px;cursor:pointer}

.cart{position:fixed;right:0;top:0;width:350px;height:100%;background:white;box-shadow:-10px 0 20px rgba(0,0,0,.2);padding:20px;display:none;overflow:auto}

.login,.admin{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
.panel{background:white;border-radius:18px;padding:20px;width:90%;max-width:1000px;max-height:90vh;overflow:auto}

.admin-grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
.admin input,.admin textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px}

.footer{background:#111;color:white;text-align:center;padding:20px;margin-top:20px}
.footer img{width:28px;margin:6px}

</style>
</head>
<body>

<header class="header">
<img src="logo.png" class="logo" alt="logo">
<div class="actions">
<button class="icon-btn" onclick="openStatus()">📦</button>
<button class="icon-btn" onclick="openAdminLogin()">👤</button>
<button class="icon-btn" onclick="toggleCart()">🛒</button>
</div>
</header>

<section class="hero">
<h1>Criando personalizados para momentos únicos</h1>
</section>

<div class="topbar">
<div class="search-wrap">
<input placeholder="Buscar produtos" onkeyup="searchProduct(this.value)">
</div>
</div>

<section class="products" id="productList"></section>

<div class="cart" id="cart"></div>

<!-- LOGIN ADMIN -->
<div class="login" id="loginModal">
<div class="panel">
<h3>Login Admin</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button class="primary" onclick="loginAdmin()">Entrar</button>
<button class="secondary" onclick="closeAdminLogin()">Cancelar</button>
</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminModal">
<div class="panel">
<h2>Painel Administrativo</h2>
<button class="secondary" onclick="closeAdmin()">Voltar</button>

<div class="admin-grid">

<div>
<h3>Novo produto</h3>
<input id="pname" placeholder="Nome">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pprice" placeholder="Preço">

<label>Imagem do produto</label>
<input type="file" id="pimage">

<button class="primary" onclick="addProduct()">Salvar</button>

</div>

<div>
<h3>Produtos cadastrados</h3>
<div id="adminProducts"></div>
</div>

</div>

</div>
</div>

<footer class="footer">
<a href="https://wa.me/5591984233046"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a href="https://instagram.com/sena__personalizados"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
</footer>

<script>

const SUPABASE_URL="https://bhvcxiiafdutoaloqflr.supabase.co"
const SUPABASE_KEY="sb_publishable_3XViRAlVJHJ8C3R9moGhIw_TaBt-A4F"

const supabaseClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

let products=[]
let cart=[]

/* ---------- LOAD PRODUCTS ---------- */

async function loadProducts(){

const {data}=await supabaseClient.from("products").select("*")
products=data||[]

renderProducts(products)
renderAdminProducts()

}

/* ---------- RENDER PRODUCTS ---------- */

function renderProducts(list){

const area=document.getElementById("productList")
area.innerHTML=""

list.forEach(p=>{

area.innerHTML+=`

<div class="card">

<img src="${p.image}">

<h4>${p.name}</h4>

<p>${p.desc}</p>

<div class="price">R$ ${p.price}</div>

<div class="qty-box">
<button onclick="adjustQty(${p.id},-1)">-</button>
<span id="q${p.id}">1</span>
<button onclick="adjustQty(${p.id},1)">+</button>
</div>

<button class="primary" onclick="addCart(${p.id})">Adicionar</button>

</div>

`

})

}

function adjustQty(id,v){

const el=document.getElementById("q"+id)
let n=parseInt(el.innerText)

n+=v
if(n<1)n=1

el.innerText=n

}

/* ---------- SEARCH ---------- */

function searchProduct(text){

text=text.toLowerCase()

const f=products.filter(p=>p.name.toLowerCase().includes(text))

renderProducts(f)

}

/* ---------- CART ---------- */

function addCart(id){

const p=products.find(x=>x.id===id)

const qty=parseInt(document.getElementById("q"+id).innerText)

cart.push({product:p,qty:qty,obs:""})

updateCart()

toggleCart()

}

function toggleCart(){

const c=document.getElementById("cart")

c.style.display=c.style.display=="block"?"none":"block"

}

function updateCart(){

const c=document.getElementById("cart")

let html="<h3>Carrinho</h3>"

let total=0

cart.forEach((i,index)=>{

const sub=i.product.price*i.qty

total+=sub

html+=`

<div>

<b>${i.product.name}</b>

<br>

<button onclick="changeQty(${index},-1)">-</button>
${i.qty}
<button onclick="changeQty(${index},1)">+</button>

<br>

<textarea placeholder="Observação" oninput="saveObs(${index},this.value)">${i.obs}</textarea>

<br>

<button onclick="removeItem(${index})">Remover</button>

</div>

<hr>

`

})

html+=`<h4>Total R$ ${total}</h4>`

html+=`<button onclick="finishOrder(${total})">Finalizar pedido</button>`

c.innerHTML=html

}

function changeQty(i,v){

cart[i].qty+=v

if(cart[i].qty<1)cart[i].qty=1

updateCart()

}

function removeItem(i){

cart.splice(i,1)
updateCart()

}

function saveObs(i,val){
cart[i].obs=val
}

/* ---------- WHATSAPP ---------- */

async function finishOrder(total){

const code="PED"+Date.now().toString().slice(-6)

let msg="Olá! Gostaria de fazer este pedido:%0A"

cart.forEach(i=>{
msg+=`${i.product.name} x${i.qty}%0A`
})

msg+=`%0ATotal: R$ ${total}`

await supabaseClient.from("orders").insert([
{
code:code,
product:msg,
total:total,
status:"Novo"
}
])

window.open(`https://wa.me/5591984233046?text=${msg}`)

cart=[]
updateCart()

}

/* ---------- ADMIN LOGIN ---------- */

function openAdminLogin(){

const m=document.getElementById("loginModal")
m.style.display="flex"

}

function closeAdminLogin(){

const m=document.getElementById("loginModal")
m.style.display="none"

}

async function loginAdmin(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const {error}=await supabaseClient.auth.signInWithPassword({email,password})

if(error){alert("Erro no login");return}

closeAdminLogin()

document.getElementById("adminModal").style.display="flex"

}

function closeAdmin(){

const a=document.getElementById("adminModal")
a.style.display="none"

}

/* ---------- ADMIN PRODUCTS ---------- */

function renderAdminProducts(){

const area=document.getElementById("adminProducts")

area.innerHTML=""

products.forEach(p=>{

area.innerHTML+=`

<div>

<b>${p.name}</b>

<br>

<button onclick="editProduct(${p.id})">Editar</button>
<button onclick="deleteProduct(${p.id})">Excluir</button>

<hr>

</div>

`

})

}

async function deleteProduct(id){

await supabaseClient.from("products").delete().eq("id",id)

loadProducts()

}

function editProduct(id){

const p=products.find(x=>x.id===id)

const name=prompt("Nome",p.name)

if(!name)return

supabaseClient.from("products").update({name:name}).eq("id",id)

loadProducts()

}

/* ---------- UPLOAD IMAGE TO SUPABASE STORAGE ---------- */

async function addProduct(){

const name=document.getElementById("pname").value
const desc=document.getElementById("pdesc").value
const price=parseFloat(document.getElementById("pprice").value)

const file=document.getElementById("pimage").files[0]

if(!file){alert("Selecione uma imagem");return}

const fileName=Date.now()+"_"+file.name

const {error:uploadError}=await supabaseClient.storage
.from("produtos")
.upload(fileName,file)

if(uploadError){console.log(uploadError);alert("Erro upload imagem");return}

const {data}=supabaseClient.storage
.from("produtos")
.getPublicUrl(fileName)

const imageUrl=data.publicUrl

await supabaseClient.from("products").insert([
{name,desc,price,image:imageUrl}
])

alert("Produto cadastrado")

loadProducts()

}

loadProducts()

</script>

</body>
</html>
