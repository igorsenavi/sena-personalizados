<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sena Personalizados</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#fff;padding:10px 20px;display:flex;align-items:center;gap:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.logo{font-weight:bold;font-size:20px}
.search{flex:1}
.search input{width:100%;padding:8px;border-radius:6px;border:1px solid #ccc}
.cart{cursor:pointer;font-weight:bold}
.banner{background:#ff7a00;color:#fff;text-align:center;padding:20px;font-size:20px}
.filters{display:flex;gap:10px;padding:10px 20px;background:#fff}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1);display:flex;flex-direction:column}
.card img{width:100%;border-radius:8px}
.card h4{margin:10px 0 5px}
.price{font-weight:bold;color:#ff7a00}
button{margin-top:auto;padding:8px;border:none;border-radius:6px;background:#ff7a00;color:#fff;cursor:pointer}
#cartModal{position:fixed;top:0;right:-400px;width:350px;height:100%;background:#fff;box-shadow:-2px 0 8px rgba(0,0,0,0.2);padding:20px;transition:0.3s;display:flex;flex-direction:column}
#cartModal.open{right:0}
.cart-item{display:flex;justify-content:space-between;margin-bottom:10px}
.total{margin-top:auto;font-weight:bold}
.whatsapp{background:#25d366;margin-top:10px}

/* painel admin */
.admin-panel{background:#fff;margin:20px;padding:20px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.admin-panel input,.admin-panel select{margin:5px 0;padding:6px;width:100%}
.admin-title{font-weight:bold;margin-bottom:10px}
</style>
</head>
<body>

<header>
<div class="menu">☰</div>
<div class="logo">Sena Personalizados</div>
<div class="search"><input type="text" id="search" placeholder="Buscar produtos..."></div>
<div class="cart" onclick="toggleCart()">🛒 (<span id="cartCount">0</span>)</div>
</header>

<div class="banner">🎁 Kits personalizados a partir de R$15</div>

<div class="filters">
<select id="filter">
<option value="">Todas categorias</option>
<option value="kit">Kits</option>
<option value="foto">Fotos</option>
<option value="chaveiro">Chaveiros</option>
</select>
</div>

<div class="products" id="products"></div>

<!-- carrinho -->
<div id="cartModal">
<h3>Carrinho</h3>
<div id="cartItems"></div>
<div class="total">Total: R$ <span id="cartTotal">0</span></div>
<button class="whatsapp" onclick="sendWhatsApp()">Finalizar no WhatsApp</button>
</div>

<!-- painel para adicionar produtos -->
<div class="admin-panel">
<div class="admin-title">Adicionar Produto</div>
<input id="pname" placeholder="Nome do produto">
<input id="pprice" type="number" placeholder="Preço">
<select id="pcat">
<option value="kit">Kit</option>
<option value="foto">Foto</option>
<option value="chaveiro">Chaveiro</option>
</select>
<input id="pimg" placeholder="Link da imagem">
<button onclick="addProduct()">Adicionar Produto</button>
</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[
{id:1,name:"Kit Personalizado",price:15,cat:"kit",img:"https://via.placeholder.com/300"},
{id:2,name:"Foto Impressa",price:5,cat:"foto",img:"https://via.placeholder.com/300"},
{id:3,name:"Chaveiro Personalizado",price:8,cat:"chaveiro",img:"https://via.placeholder.com/300"}
]

let cart=[]

function saveProducts(){
localStorage.setItem("products",JSON.stringify(products))
}

function renderProducts(){
const container=document.getElementById("products")
const search=document.getElementById("search").value.toLowerCase()
const filter=document.getElementById("filter").value
container.innerHTML=""

products
.filter(p=>(!filter||p.cat===filter)&&p.name.toLowerCase().includes(search))
.forEach(p=>{
container.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">R$ ${p.price}</div>
<button onclick="addToCart(${p.id})">Adicionar ao carrinho</button>
</div>`
})
}

function addProduct(){
const name=document.getElementById("pname").value
const price=parseFloat(document.getElementById("pprice").value)
const cat=document.getElementById("pcat").value
const img=document.getElementById("pimg").value

if(!name||!price||!img){alert("Preencha todos os campos");return}

products.push({
 id:Date.now(),
 name,
 price,
 cat,
 img
})

saveProducts()
renderProducts()

alert("Produto adicionado!")
}

function addToCart(id){
const product=products.find(p=>p.id===id)
const item=cart.find(i=>i.id===id)
if(item){item.qty++}else{cart.push({...product,qty:1})}
updateCart()
}

function updateCart(){
const items=document.getElementById("cartItems")
const count=document.getElementById("cartCount")
const total=document.getElementById("cartTotal")
items.innerHTML=""
let sum=0
let q=0

cart.forEach(i=>{
items.innerHTML+=`<div class="cart-item">${i.name} x${i.qty} <span>R$ ${i.price*i.qty}</span></div>`
sum+=i.price*i.qty
q+=i.qty
})

count.innerText=q

total.innerText=sum
}

function toggleCart(){
document.getElementById("cartModal").classList.toggle("open")
}

function sendWhatsApp(){
let text="Olá, quero finalizar meu pedido:%0A"
let total=0

cart.forEach(i=>{
text+=`${i.qty}x ${i.name} - R$${i.price*i.qty}%0A`
total+=i.price*i.qty
})

text+=`Total: R$${total}`

const phone="5591984233046"
window.open(`https://wa.me/${phone}?text=${text}`)
}


document.getElementById("search").addEventListener("input",renderProducts)
document.getElementById("filter").addEventListener("change",renderProducts)

renderProducts()
</script>

</body>
</html>
