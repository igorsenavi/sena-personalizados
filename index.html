<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sena Personalizados</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--cor:#830064;--cor2:#a1007b;--bg:#f6f7fb;--txt:#23232b;--muted:#6b7280;--b:#e9e9ef;--w:#fff}
    *{box-sizing:border-box} body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--txt)}
    .header{position:sticky;top:0;z-index:20;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 22px;box-shadow:0 6px 20px rgba(0,0,0,.05)}
    .logo{height:48px}.actions{display:flex;gap:12px}.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--b);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .hero{margin:18px 22px 0;background:linear-gradient(90deg,var(--cor),var(--cor2));color:#fff;border-radius:22px;padding:18px 22px;text-align:center}.hero h1{margin:0;font-size:26px}
    .topbar{padding:18px 22px 8px;display:grid;grid-template-columns:1fr 260px;gap:12px}.search-wrap,.filter-wrap{background:#fff;border:1px solid var(--b);border-radius:16px;padding:12px 14px;display:flex;gap:10px;align-items:center;box-shadow:0 4px 14px rgba(0,0,0,.04)}
    .search-wrap input,.filter-wrap select{border:none;outline:none;width:100%;background:transparent;font-size:15px;font-family:inherit}
    .products{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;padding:18px 22px 30px}
    .card{background:#fff;border:1px solid var(--b);border-radius:20px;padding:14px;box-shadow:0 10px 24px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:10px}
    .card img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:16px;background:#f0f0f5}.card h4{margin:0;font-size:17px}.card p{margin:0;color:var(--muted);font-size:14px;line-height:1.45}
    .small{font-size:13px;color:var(--muted)} .price{font-size:20px;font-weight:700;color:var(--cor)} .row{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}
    .qty-box,.cart-qty{display:flex;align-items:center;gap:8px;border:1px solid var(--b);border-radius:12px;padding:6px 10px;background:#fff}
    .qty-box button,.cart-qty button{width:28px;height:28px;border:none;border-radius:8px;background:#f3f4f8;cursor:pointer}
    .primary,.secondary{border-radius:12px;padding:11px 14px;cursor:pointer;font-weight:600;font-family:inherit}.primary{border:none;background:var(--cor);color:#fff}.secondary{border:1px solid var(--cor);background:#fff;color:var(--cor)}
    .cart{position:fixed;right:0;top:0;width:380px;max-width:100%;height:100%;background:#fff;box-shadow:-12px 0 30px rgba(0,0,0,.12);padding:18px;display:none;overflow:auto;z-index:30}
    .cart-head,.admin-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.cart-item{border:1px solid var(--b);border-radius:16px;padding:12px;margin-bottom:12px;background:#fbfbfe}
    .cart-item textarea,.panel textarea,.panel input,.panel select{width:100%;border:1px solid var(--b);border-radius:10px;padding:10px 12px;font-family:inherit}
    .cart-item textarea{min-height:64px;margin-top:8px}
    .login,.admin,.status-modal,.checkout-modal{position:fixed;inset:0;background:rgba(16,18,27,.55);display:none;align-items:center;justify-content:center;z-index:40;padding:16px}
    .panel,.login-box{background:#fff;border-radius:22px;box-shadow:0 20px 50px rgba(0,0,0,.16)} .panel{width:min(1180px,100%);max-height:92vh;overflow:auto;padding:22px}.login-box{width:min(420px,100%);padding:24px}
    .admin-grid{display:grid;grid-template-columns:340px 1fr;gap:24px}.admin-card{background:#fafafe;border:1px solid var(--b);border-radius:18px;padding:18px}
    .admin-list-item{display:flex;justify-content:space-between;gap:12px;align-items:start;padding:12px;border-bottom:1px solid var(--b)} .admin-list-item:last-child{border-bottom:none}
    .tabs{display:flex;gap:10px;margin:16px 0}.tab-btn{padding:10px 14px;border:1px solid var(--b);background:#fff;border-radius:12px;cursor:pointer}.tab-btn.active{background:var(--cor);color:#fff;border-color:var(--cor)}
    .footer{background:#111;color:#fff;text-align:center;padding:22px;margin-top:20px}.footer a{display:inline-flex;margin:0 8px}.footer img{width:28px;height:28px}
    .empty{padding:28px;text-align:center;color:var(--muted)} .success{color:#0f8a4b}.error{color:#b42318}.mt12{margin-top:12px}.mb8{margin-bottom:8px}
    @media(max-width:860px){.admin-grid{grid-template-columns:1fr}.topbar{grid-template-columns:1fr}.header{padding:12px 14px}.hero h1{font-size:22px}.hero,.topbar,.products{margin-left:14px;margin-right:14px}.products{padding:18px 14px 30px}}
  </style>
</head>
<body>
  <header class="header">
    <img src="logo.png" class="logo" alt="Sena Personalizados" onerror="this.style.display='none'">
    <div class="actions">
      <button class="icon-btn" onclick="openStatus()" title="Status do pedido">📦</button>
      <button class="icon-btn" onclick="openAdminLogin()" title="Administração">👤</button>
      <button class="icon-btn" onclick="toggleCart()" title="Carrinho">🛒</button>
    </div>
  </header>

  <section class="hero"><h1>Criando personalizados para momentos únicos</h1></section>

  <div class="topbar">
    <div class="search-wrap"><span>🔎</span><input type="text" placeholder="Buscar produtos" onkeyup="searchProduct(this.value)"></div>
    <div class="filter-wrap"><select onchange="filterCategory(this.value)"><option value="">Todas categorias</option><option>Kit festas basico</option><option>Kit festa semi luxo</option><option>Produtos isolados</option><option>Sacolas personalizadas</option><option>Kit pegue e monte</option><option>Kit é só 1 bolinho</option><option>Brindes</option><option>Impressões em geral</option></select></div>
  </div>

  <section class="products" id="productList"></section>
  <div class="cart" id="cart"></div>

  <div class="checkout-modal" id="checkoutModal"><div class="login-box"><h3 style="margin-top:0">Finalizar pedido</h3><input id="customerName" placeholder="Nome do cliente"><input id="customerPhone" placeholder="Telefone / WhatsApp"><input id="couponCode" placeholder="Cupom de desconto (opcional)"><button class="primary mt12" style="width:100%" onclick="confirmCheckout()">Continuar para o WhatsApp</button><button class="secondary mt12" style="width:100%" onclick="closeCheckout()">Cancelar</button><p id="checkoutMsg" class="small mt12"></p></div></div>

  <div class="status-modal" id="statusModal"><div class="login-box"><div class="cart-head"><h3 style="margin:0">Status do pedido</h3><button class="secondary" onclick="closeStatus()">Fechar</button></div><input id="statusCode" placeholder="Digite o código do pedido"><button class="primary mt12" style="width:100%" onclick="checkStatus()">Pesquisar</button><p id="statusResult" class="small mt12"></p></div></div>

  <div class="login" id="loginModal"><div class="login-box"><h3 style="margin-top:0">Login Admin</h3><input id="email" placeholder="Email"><input id="password" type="password" placeholder="Senha"><div class="row mt12"><button class="primary" onclick="loginAdmin()">Entrar</button><button class="secondary" onclick="closeAdminLogin()">Cancelar</button></div><p id="loginMsg" class="small mt12"></p></div></div>

  <div class="admin" id="adminModal"><div class="panel">
    <div class="admin-head"><h2 style="margin:0">Painel Administrativo</h2><div class="row"><button class="secondary" onclick="closeAdmin()">Voltar</button><button class="secondary" onclick="logoutAdmin()">Sair</button></div></div>
    <div class="tabs"><button class="tab-btn active" onclick="showTab('productsTab',this)">Produtos</button><button class="tab-btn" onclick="showTab('ordersTab',this)">Pedidos</button><button class="tab-btn" onclick="showTab('couponsTab',this)">Cupons</button></div>

    <div id="productsTab">
      <div class="admin-grid">
        <div class="admin-card">
          <h3 style="margin-top:0">Novo produto</h3>
          <input id="pname" placeholder="Nome do produto">
          <textarea id="pdescription" placeholder="Descrição"></textarea>
          <input id="pprice" placeholder="Preço">
          <select id="pcategory"><option value="">Selecione a categoria</option><option>Kit festas basico</option><option>Kit festa semi luxo</option><option>Produtos isolados</option><option>Sacolas personalizadas</option><option>Kit pegue e monte</option><option>Kit é só 1 bolinho</option><option>Brindes</option><option>Impressões em geral</option></select>
          <label class="small">Imagem do produto</label>
          <input type="file" id="pimage" accept="image/*">
          <p class="small mb8">A imagem sobe direto no Supabase Storage.</p>
          <button class="primary" style="width:100%" onclick="addOrUpdateProduct()">Salvar</button>
          <input type="hidden" id="editingId">
          <p id="adminMsg" class="small mt12"></p>
          <hr style="border:none;border-top:1px solid var(--b);margin:18px 0">
          <button class="secondary" style="width:100%;margin-bottom:8px" onclick="exportProducts()">Exportar produtos</button>
          <button class="secondary" style="width:100%" onclick="exportSales()">Exportar vendas</button>
        </div>
        <div class="admin-card"><h3 style="margin-top:0">Produtos cadastrados</h3><div id="adminProducts"></div></div>
      </div>
    </div>

    <div id="ordersTab" style="display:none"><div class="admin-card"><h3 style="margin-top:0">Pedidos</h3><div id="adminOrders"></div></div></div>

    <div id="couponsTab" style="display:none">
      <div class="admin-grid">
        <div class="admin-card">
          <h3 style="margin-top:0">Novo cupom</h3>
          <input id="couponName" placeholder="Código do cupom (ex: MAE10)">
          <input id="couponDiscount" placeholder="Desconto em % (ex: 10)">
          <button class="primary" style="width:100%" onclick="saveCoupon()">Salvar cupom</button>
          <p id="couponMsg" class="small mt12"></p>
        </div>
        <div class="admin-card"><h3 style="margin-top:0">Cupons cadastrados</h3><div id="adminCoupons"></div></div>
      </div>
    </div>
  </div></div>

  <footer class="footer"><a href="https://wa.me/5591984233046" target="_blank" rel="noreferrer"><img alt="WhatsApp" src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a><a href="https://instagram.com/sena__personalizados" target="_blank" rel="noreferrer"><img alt="Instagram" src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a></footer>

  <script>
    const SUPABASE_URL = "https://bhvcxiiafdutoaloqflr.supabase.co";
    const SUPABASE_KEY = "sb_publishable_3XViRAlVJHJ8C3R9moGhIw_TaBt-A4F";
    const BUCKET_NAME = "produtos";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let products = [], cart = [], coupons = [], selectedCategory = '', pendingTotal = 0;

    async function loadProducts(){const {data,error}=await supabaseClient.from('products').select('*').order('id',{ascending:false}); if(error){console.log(error);document.getElementById('productList').innerHTML='<div class="empty">Erro ao carregar produtos.</div>';return;} products=data||[]; renderProducts(applyFilters()); renderAdminProducts();}
    async function loadCoupons(){const {data}=await supabaseClient.from('coupons').select('*').order('id',{ascending:false}); coupons=data||[]; renderCoupons();}
    async function loadOrders(){const {data}=await supabaseClient.from('orders').select('*').order('id',{ascending:false}); renderOrders(data||[]);}
    function applyFilters(search=''){let list=[...products]; if(selectedCategory) list=list.filter(p=>(p.category||'')===selectedCategory); if(search) list=list.filter(p=>(p.name||'').toLowerCase().includes(search)||(p.description||'').toLowerCase().includes(search)); return list;}
    function renderProducts(list){const area=document.getElementById('productList'); if(!list.length){area.innerHTML='<div class="empty">Nenhum produto encontrado.</div>';return;} area.innerHTML=''; list.forEach(p=>{area.innerHTML+=`<div class="card"><img src="${p.image||''}" alt="${p.name||''}" onerror="this.src='https://via.placeholder.com/500x500?text=Produto'"><h4>${p.name||''}</h4><p>${p.description||''}</p><div class="small">${p.category||''}</div><div class="row between"><div class="price">R$ ${Number(p.price||0).toFixed(2).replace('.',',')}</div><div class="qty-box"><button onclick="adjustCardQty(${p.id},-1)">-</button><span id="cardqty-${p.id}">1</span><button onclick="adjustCardQty(${p.id},1)">+</button></div></div><button class="primary" style="width:100%" onclick="addCart(${p.id})">Adicionar ao carrinho</button></div>`})}
    function searchProduct(text){renderProducts(applyFilters(text.toLowerCase().trim()))}
    function filterCategory(cat){selectedCategory=cat; renderProducts(applyFilters(document.querySelector('.search-wrap input').value.toLowerCase().trim()))}
    function adjustCardQty(id,delta){const el=document.getElementById(`cardqty-${id}`); let n=parseInt(el.textContent||'1',10); n+=delta; if(n<1)n=1; el.textContent=n}
    function getCardQty(id){const el=document.getElementById(`cardqty-${id}`); return el?parseInt(el.textContent||'1',10):1}
    function addCart(id){const p=products.find(x=>x.id===id); if(!p) return; const qty=getCardQty(id); cart.push({product:p,qty,obs:''}); updateCart(); toggleCart(true)}
    function toggleCart(forceOpen=false){const c=document.getElementById('cart'); c.style.display=forceOpen?'block':(c.style.display==='block'?'none':'block')}
    function updateCart(){const c=document.getElementById('cart'); let html=`<div class="cart-head"><h3 style="margin:0">Carrinho</h3><button class="secondary" onclick="toggleCart()">Fechar</button></div>`; if(!cart.length){c.innerHTML=html+'<div class="empty">Seu carrinho está vazio.</div>'; return} let total=0; cart.forEach((item,i)=>{const sub=Number(item.product.price)*item.qty; total+=sub; html+=`<div class="cart-item"><b>${item.product.name}</b><div class="cart-qty mt12"><button onclick="changeQty(${i},-1)">-</button><span>${item.qty}</span><button onclick="changeQty(${i},1)">+</button></div><textarea placeholder="Observação do item" oninput="saveObs(${i},this.value)">${item.obs||''}</textarea><div class="row between mt12"><span class="small">Subtotal</span><strong>R$ ${sub.toFixed(2).replace('.',',')}</strong></div><button class="secondary mt12" style="width:100%" onclick="removeItem(${i})">Remover</button></div>`}); html+=`<div class="row between" style="margin:16px 0"><strong>Total</strong><strong style="color:var(--cor)">R$ ${total.toFixed(2).replace('.',',')}</strong></div><button class="primary" style="width:100%" onclick="openCheckout(${total})">Finalizar pedido</button>`; c.innerHTML=html}
    function changeQty(i,v){cart[i].qty=Math.max(1,cart[i].qty+v); updateCart()} function saveObs(i,val){cart[i].obs=val} function removeItem(i){cart.splice(i,1); updateCart()}
    function openCheckout(total){pendingTotal=total; document.getElementById('checkoutModal').style.display='flex'; document.getElementById('checkoutMsg').textContent=''} function closeCheckout(){document.getElementById('checkoutModal').style.display='none'}
    function applyCoupon(total,code){if(!code) return {final:total, discount:0}; const cup=coupons.find(c=>(c.code||'').toUpperCase()===(code||'').toUpperCase()); if(!cup) return {final:total, discount:0, invalid:true}; const discount=(total*(Number(cup.discount_percent)||0))/100; return {final:Math.max(0,total-discount), discount}}
    async function confirmCheckout(){const name=document.getElementById('customerName').value.trim(); const phone=document.getElementById('customerPhone').value.trim(); const coupon=document.getElementById('couponCode').value.trim(); const msgEl=document.getElementById('checkoutMsg'); if(!name||!phone){msgEl.textContent='Informe nome e telefone.'; return} const cup=applyCoupon(pendingTotal,coupon); if(cup.invalid){msgEl.textContent='Cupom inválido.'; return} const finalTotal=cup.final; const code='PED'+Date.now().toString().slice(-6); let msg=`Olá! Gostaria de fazer este pedido:%0A%0ACódigo: ${code}%0ANome: ${name}%0ATelefone: ${phone}%0A`; cart.forEach(i=>{msg+=`${i.product.name} x${i.qty}${i.obs?` | Obs: ${i.obs}`:''}%0A`}); if(coupon&& !cup.invalid){msg+=`Cupom: ${coupon}%0ADesconto: R$ ${cup.discount.toFixed(2).replace('.',',')}%0A`} msg+=`%0ATotal: R$ ${finalTotal.toFixed(2).replace('.',',')}`; const {error}=await supabaseClient.from('orders').insert([{code,customer_name:name,customer_phone:phone,product:cart.map(i=>`${i.product.name} x${i.qty}${i.obs?` (${i.obs})`:''}`).join(' | '),total:finalTotal,status:'Novo',coupon_code:coupon||null}]); if(error){console.log(error); msgEl.textContent='Erro ao salvar pedido.'; return} window.open(`https://wa.me/5591984233046?text=${msg}`,'_blank'); cart=[]; updateCart(); closeCheckout(); toggleCart()}
    function openStatus(){document.getElementById('statusModal').style.display='flex'} function closeStatus(){document.getElementById('statusModal').style.display='none'}
    async function checkStatus(){const code=document.getElementById('statusCode').value.trim(); const res=document.getElementById('statusResult'); if(!code) return; const {data,error}=await supabaseClient.rpc('lookup_order_status',{p_code:code}); if(error||!data||!data.length){res.textContent='Pedido não encontrado.'; return} res.textContent=`Código ${data[0].code} • Status: ${data[0].status}`}
    function openAdminLogin(){document.getElementById('loginModal').style.display='flex'; document.getElementById('loginMsg').textContent=''} function closeAdminLogin(){document.getElementById('loginModal').style.display='none'}
    async function loginAdmin(){const email=document.getElementById('email').value.trim(); const password=document.getElementById('password').value; const {error}=await supabaseClient.auth.signInWithPassword({email,password}); if(error){document.getElementById('loginMsg').textContent='Email ou senha inválidos.'; return} closeAdminLogin(); document.getElementById('adminModal').style.display='flex'; loadProducts(); loadOrders(); loadCoupons()}
    async function logoutAdmin(){await supabaseClient.auth.signOut(); closeAdmin()} function closeAdmin(){document.getElementById('adminModal').style.display='none'}
    function showTab(id,btn){['productsTab','ordersTab','couponsTab'].forEach(t=>document.getElementById(t).style.display=(t===id?'block':'none')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active')}
    function fillForm(p){document.getElementById('editingId').value=p.id||''; document.getElementById('pname').value=p.name||''; document.getElementById('pdescription').value=p.description||''; document.getElementById('pprice').value=p.price||''; document.getElementById('pcategory').value=p.category||''; document.getElementById('adminMsg').textContent='Editando produto selecionado.'}
    function resetForm(){document.getElementById('editingId').value=''; document.getElementById('pname').value=''; document.getElementById('pdescription').value=''; document.getElementById('pprice').value=''; document.getElementById('pcategory').value=''; document.getElementById('pimage').value=''}
    async function uploadProductImage(file){const {data:userData}=await supabaseClient.auth.getUser(); if(!userData?.user) throw new Error('Você precisa estar logado para enviar imagem.'); if(!file) throw new Error('Selecione uma imagem.'); const safeName=file.name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9._-]/g,''); const fileName=`${Date.now()}_${safeName}`; const {error:uploadError}=await supabaseClient.storage.from(BUCKET_NAME).upload(fileName,file,{cacheControl:'3600',upsert:false,contentType:file.type||'image/*'}); if(uploadError) throw uploadError; const {data}=supabaseClient.storage.from(BUCKET_NAME).getPublicUrl(fileName); return data.publicUrl}
    async function addOrUpdateProduct(){const id=document.getElementById('editingId').value; const name=document.getElementById('pname').value.trim(); const description=document.getElementById('pdescription').value.trim(); const price=parseFloat(document.getElementById('pprice').value); const category=document.getElementById('pcategory').value; const file=document.getElementById('pimage').files[0]; const msg=document.getElementById('adminMsg'); msg.className='small'; if(!name||!description||isNaN(price)||!category){msg.textContent='Preencha nome, descrição, preço e categoria.'; msg.classList.add('error'); return} try{let image=null; if(file) image=await uploadProductImage(file); if(id){const payload={name,description,price,category}; if(image) payload.image=image; const {error}=await supabaseClient.from('products').update(payload).eq('id',id); if(error) throw error; msg.textContent='Produto atualizado com sucesso.'} else {if(!image){msg.textContent='Selecione uma imagem para o novo produto.'; msg.classList.add('error'); return} const {error}=await supabaseClient.from('products').insert([{name,description,price,category,image}]); if(error) throw error; msg.textContent='Cadastro concluído.'} msg.classList.add('success'); resetForm(); await loadProducts()} catch(error){console.log(error); msg.textContent=`Erro no upload/salvamento: ${error.message||'verifique bucket, policies e login admin.'}`; msg.classList.add('error')}}
    function renderAdminProducts(){const area=document.getElementById('adminProducts'); if(!area) return; if(!products.length){area.innerHTML='<div class="empty">Nenhum produto cadastrado.</div>'; return} area.innerHTML=''; products.forEach(p=>{const safe=JSON.stringify(p).replace(/'/g,'&#39;'); area.innerHTML+=`<div class="admin-list-item"><div><strong>${p.name}</strong><br><span class="small">R$ ${Number(p.price).toFixed(2).replace('.',',')}</span><br><span class="small">${p.category||''}</span><br><span class="small">${p.description||''}</span></div><div class="row"><button class="secondary" onclick='fillForm(${safe})'>Editar</button><button class="secondary" onclick='deleteProduct(${p.id})'>Excluir</button></div></div>`})}
    async function deleteProduct(id){if(!confirm('Deseja excluir este produto?')) return; const {error}=await supabaseClient.from('products').delete().eq('id',id); if(error){console.log(error); alert('Erro ao excluir produto.'); return} loadProducts()}
    function renderOrders(list){const area=document.getElementById('adminOrders'); if(!area) return; if(!list.length){area.innerHTML='<div class="empty">Nenhum pedido encontrado.</div>'; return} area.innerHTML=''; list.forEach(o=>{area.innerHTML+=`<div class="admin-list-item"><div><strong>${o.code||''}</strong><br><span class="small">${o.customer_name||''} • ${o.customer_phone||''}</span><br><span class="small">${o.product||''}</span><br><span class="small">Total: R$ ${Number(o.total||0).toFixed(2).replace('.',',')}</span></div><div style="min-width:180px"><select onchange="updateOrderStatus(${o.id},this.value)"><option ${o.status==='Novo'?'selected':''}>Novo</option><option ${o.status==='Produção'?'selected':''}>Produção</option><option ${o.status==='Enviado'?'selected':''}>Enviado</option><option ${o.status==='Concluído'?'selected':''}>Concluído</option></select></div></div>`})}
    async function updateOrderStatus(id,status){const {error}=await supabaseClient.from('orders').update({status}).eq('id',id); if(error){console.log(error); alert('Erro ao atualizar status'); return} loadOrders()}
    async function saveCoupon(){const code=document.getElementById('couponName').value.trim().toUpperCase(); const discount_percent=parseFloat(document.getElementById('couponDiscount').value); const msg=document.getElementById('couponMsg'); if(!code||isNaN(discount_percent)){msg.textContent='Preencha cupom e desconto corretamente.'; return} const {error}=await supabaseClient.from('coupons').insert([{code,discount_percent}]); if(error){console.log(error); msg.textContent='Erro ao salvar cupom.'; return} msg.textContent='Cupom salvo com sucesso.'; document.getElementById('couponName').value=''; document.getElementById('couponDiscount').value=''; loadCoupons()}
    function renderCoupons(){const area=document.getElementById('adminCoupons'); if(!area) return; if(!coupons.length){area.innerHTML='<div class="empty">Nenhum cupom cadastrado.</div>'; return} area.innerHTML=''; coupons.forEach(c=>{area.innerHTML+=`<div class="admin-list-item"><div><strong>${c.code}</strong><br><span class="small">${c.discount_percent}% de desconto</span></div><div><button class="secondary" onclick="deleteCoupon(${c.id})">Excluir</button></div></div>`})}
    async function deleteCoupon(id){const {error}=await supabaseClient.from('coupons').delete().eq('id',id); if(error){console.log(error); alert('Erro ao excluir cupom'); return} loadCoupons()}
    function downloadFile(data,file){const blob=new Blob([data],{type:'text/csv;charset=utf-8;'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=file; a.click()}
    function exportProducts(){let csv='Nome,Descricao,Categoria,Preco,Imagem\n'; products.forEach(p=>{csv+=`"${p.name}","${(p.description||'').replace(/"/g,'""')}","${p.category||''}","${p.price}","${p.image||''}"\n`}); downloadFile(csv,'produtos.csv')}
    async function exportSales(){const {data,error}=await supabaseClient.from('orders').select('*').order('id',{ascending:false}); if(error){console.log(error); alert('Erro ao exportar vendas.'); return} let csv='Codigo,Cliente,Telefone,Produtos,Total,Status,Cupom\n'; (data||[]).forEach(o=>{csv+=`"${o.code||''}","${o.customer_name||''}","${o.customer_phone||''}","${(o.product||'').replace(/"/g,'""')}","${o.total||0}","${o.status||''}","${o.coupon_code||''}"\n`}); downloadFile(csv,'vendas.csv')}
    loadProducts(); loadCoupons();
  </script>
</body>
