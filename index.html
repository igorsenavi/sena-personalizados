<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sena Personalizados</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
:root{
--cor:#830064;
--cor2:#5e0047;
--bg:#f4f4f6;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:var(--bg)}

header{background:var(--cor);color:white;padding:15px;display:flex;justify-content:space-between;align-items:center}

.logo{font-weight:bold;font-size:18px}

.cart-btn{background:white;color:var(--cor);padding:8px 14px;border-radius:6px;cursor:pointer}

.hero{background:linear-gradient(90deg,var(--cor),var(--cor2));color:white;padding:50px 20px;text-align:center}

.banner{background:white;padding:20px;text-align:center;margin:20px;border-radius:10px}

.section{max-width:1200px;margin:auto;padding:30px 20px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

.card{background:white;padding:15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1)}

.card img{width:100%;border-radius:6px;margin-bottom:10px}

.price{color:var(--cor);font-weight:bold}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}

.add{background:var(--cor);color:white;width:100%;margin-top:8px}

.buy{background:black;color:white;width:100%;margin-top:5px}

.footer{background:#111;color:white;text-align:center;padding:30px;margin-top:40px}

/* CART */

.cart{position:fixed;right:0;top:0;width:320px;height:100%;background:white;padding:20px;overflow:auto;display:none;box-shadow:-3px 0 10px rgba(0,0,0,0.2)}

.cart-item{border-bottom:1px solid #eee;padding:10px 0}

/* ADMIN */

.admin{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:none;padding:20px;overflow:auto}

.admin input, .admin textarea{width:100%;padding:8px;margin:6px 0}

.table{margin-top:20px}

.table div{border-bottom:1px solid #ddd;padding:8px}

.dashboard{background:#f3f3f3;padding:10px;border-radius:8px;margin-top:15px}

.install{position:fixed;bottom:20px;left:20px;background:var(--cor);color:white;padding:10px 14px;border-radius:20px;display:none}

</style>
</head>

<body>

<header>
<div class="logo">Sena Personalizados</div>
<div>
<button onclick="openAdmin()">Admin</button>
<span class="cart-btn" onclick="toggleCart()">Carrinho (<span id="cartCount">0</span>)</span>
</div>
</header>

<section class="hero">
<h1>Personalizados para momentos especiais</h1>
<p>Kits, fotos e lembranças</p>
</section>

<div class="banner" id="promoBanner"></div>

<section class="section">
<h2>Produtos</h2>
<div class="products" id="productList"></div>
</section>

<div class="footer">
<p>Sena Personalizados</p>
<p>WhatsApp: (91) 98423-3046</p>
<p>Instagram: sena__personalizados</p>
</div>

<div class="cart" id="cart"></div>

<div class="admin" id="admin">
<h2>Painel Administrativo</h2>

<div class="dashboard">
<p>Total de vendas: <span id="totalSales">0</span></p>
<p>Pedidos realizados: <span id="orders">0</span></p>
</div>

<h3>Novo Produto</h3>

<input id="pname" placeholder="Nome">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pprice" placeholder="Preço">
<input id="pimg" placeholder="URL da imagem">

<button onclick="addProduct()">Salvar Produto</button>

<h3>Produtos cadastrados</h3>

<div class="table" id="productTable"></div>

<button onclick="closeAdmin()">Fechar</button>
</div>

<button class="install" id="installBtn">Instalar APP</button>

<script>

let cart=[]

let products=JSON.parse(localStorage.getItem("products"))||[
{
id:1,
name:"Kit Dia das Mulheres",
desc:"1 foto + chaveiro",
price:15,
img:"https://picsum.photos/400?1",
sales:0
}
]

let orders=Number(localStorage.getItem("orders"))||0
let totalSales=Number(localStorage.getItem("sales"))||0

function saveDB(){
localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("orders",orders)
localStorage.setItem("sales",totalSales)
}

function renderProducts(){
const list=document.getElementById("productList")
list.innerHTML=""

products.forEach(p=>{
list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<p class="price">R$ ${p.price}</p>
<button class="add" onclick="addCart(${p.id})">Adicionar</button>
<button class="buy" onclick="buyNow(${p.id})">Comprar</button>
</div>`
})
}

function renderBanner(){
const best=[...products].sort((a,b)=>b.sales-a.sales)[0]

if(best){

document.getElementById("promoBanner").innerHTML=
`🔥 Promoção: ${best.name} por apenas R$ ${best.price}`

}
}

function addCart(id){
const p=products.find(x=>x.id===id)
cart.push(p)
updateCart()
}

function updateCart(){
const cartDiv=document.getElementById("cart")

cartDiv.innerHTML="<h3>Carrinho</h3>"

let total=0

cart.forEach((p,i)=>{

total+=p.price

cartDiv.innerHTML+=`
<div class="cart-item">
${p.name}
<button onclick="removeItem(${i})">Remover</button>
</div>`

})

cartDiv.innerHTML+=`<h4>Total: R$ ${total}</h4>`
cartDiv.innerHTML+=`<button onclick="finishOrder(${total})">Finalizar</button>`


document.getElementById("cartCount").innerText=cart.length
}

function removeItem(i){
cart.splice(i,1)
updateCart()
}

function toggleCart(){
const c=document.getElementById("cart")
c.style.display=c.style.display==='block'?'none':'block'
}

function finishOrder(total){
orders++

totalSales+=total

cart.forEach(p=>p.sales++)

saveDB()

cart=[]

updateCart()

alert("Pedido enviado no WhatsApp")
}

function openAdmin(){
renderAdmin()

document.getElementById("admin").style.display="block"
}

function closeAdmin(){
document.getElementById("admin").style.display="none"
}

function addProduct(){

const product={
id:Date.now(),
name:document.getElementById("pname").value,
desc:document.getElementById("pdesc").value,
price:Number(document.getElementById("pprice").value),
img:document.getElementById("pimg").value,
sales:0
}

products.push(product)

saveDB()

renderProducts()
renderAdmin()

}

function renderAdmin(){

const table=document.getElementById("productTable")

table.innerHTML=""

products.forEach(p=>{

table.innerHTML+=`
<div>
${p.name} - R$ ${p.price}
<button onclick="deleteProduct(${p.id})">Excluir</button>
</div>`

})


document.getElementById("totalSales").innerText="R$ "+totalSales

document.getElementById("orders").innerText=orders

}

function deleteProduct(id){

products=products.filter(p=>p.id!==id)

saveDB()

renderProducts()
renderAdmin()

}

renderProducts()
renderBanner()

/* PWA INSTALL */

let deferredPrompt

window.addEventListener('beforeinstallprompt',(e)=>{

e.preventDefault()

deferredPrompt=e

const btn=document.getElementById("installBtn")

btn.style.display="block"

btn.onclick=()=>{

deferredPrompt.prompt()

}

})

</script>

</body>
</html>
