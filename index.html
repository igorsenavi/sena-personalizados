<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sena Personalizados</title>

<style>
:root{
--cor-principal:#830064;
--cor-secundaria:#5e0047;
--cor-fundo:#f5f5f7;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:var(--cor-fundo)}

header{background:var(--cor-principal);color:white;padding:15px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap}
.logo img{height:45px}

.search{flex:1;margin:10px}
.search input{width:100%;padding:10px;border-radius:6px;border:none}

.cart-btn{background:white;color:var(--cor-principal);padding:10px 15px;border-radius:6px;font-weight:bold;cursor:pointer}

.hero{background:linear-gradient(90deg,var(--cor-principal),var(--cor-secundaria));color:white;padding:60px 20px;text-align:center}
.hero h1{font-size:32px;margin-bottom:10px}
.hero button{padding:12px 25px;border:none;border-radius:6px;background:white;color:var(--cor-principal);font-weight:bold;cursor:pointer;margin-top:15px}

.section{padding:40px 20px;max-width:1200px;margin:auto}
.section h2{margin-bottom:20px}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}

.card{background:white;padding:15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.03)}

.card img{width:100%;border-radius:6px;margin-bottom:10px}

.desc{font-size:13px;color:#555;margin:6px 0}

.sales{font-size:12px;color:#888}

.price{color:var(--cor-principal);font-weight:bold;margin-top:4px}

.add{margin-top:10px;background:var(--cor-principal);color:white;padding:8px;border:none;width:100%;border-radius:6px;cursor:pointer}

.categories{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.categories button{padding:8px 14px;border:none;border-radius:20px;background:var(--cor-principal);color:white;cursor:pointer}

.carousel{display:flex;overflow:auto;gap:15px}
.carousel .card{min-width:200px}

.reviews{margin-top:10px;color:#ffaa00;font-size:14px}

.footer{background:#111;color:white;padding:40px 20px;text-align:center;margin-top:40px}
.footer a{color:#25D366;margin:0 10px;text-decoration:none}

.whatsapp-float{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px 18px;border-radius:50px;font-weight:bold;text-decoration:none}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;padding:20px}

.modal-content{background:white;padding:20px;border-radius:10px;max-width:520px;width:100%}

.modal-gallery{display:flex;gap:6px;margin-bottom:10px}
.modal-gallery img{width:70px;height:70px;object-fit:cover;border-radius:6px;cursor:pointer}

.modal-main{width:100%;margin-bottom:10px}

.modal textarea,.modal input{width:100%;padding:8px;margin-top:8px}

.cart-panel{position:fixed;right:0;top:0;width:320px;height:100%;background:white;box-shadow:-2px 0 10px rgba(0,0,0,0.2);padding:20px;overflow:auto;display:none}

.cart-item{border-bottom:1px solid #eee;padding:10px 0}

.instagram{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.instagram img{width:100%;border-radius:6px}

</style>
</head>

<body>

<header>
<div class="logo"><img src="logo.png"></div>

<div class="search">
<input type="text" placeholder="Buscar produtos..." onkeyup="searchProduct(this.value)">
</div>

<div class="cart-btn" onclick="toggleCart()">Carrinho (<span id="cartCount">0</span>)</div>
</header>

<section class="hero">
<h1>Personalizados para momentos especiais</h1>
<p>Kits, fotos e lembranças criativas</p>
<button onclick="scrollToProducts()">Ver produtos</button>
</section>

<section class="section">
<h2>Produtos mais vendidos</h2>
<div class="carousel" id="bestSellers"></div>
</section>

<section class="section" id="products">
<h2>Catálogo</h2>

<div class="categories">
<button onclick="filterCategory('all')">Todos</button>
<button onclick="filterCategory('kit')">Kits</button>
<button onclick="filterCategory('foto')">Fotos</button>
<button onclick="filterCategory('chaveiro')">Chaveiros</button>
</div>

<div class="products" id="productList"></div>
</section>

<section class="section">
<h2>Nosso Instagram</h2>
<div class="instagram">
<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">
<img src="https://picsum.photos/300?4">
</div>
</section>

<div class="footer">
<h3>Sena Personalizados</h3>
<p>Pedidos personalizados para todas ocasiões</p>
<a href="https://wa.me/5591984233046">WhatsApp</a>
<a href="https://instagram.com/sena__personalizados">Instagram</a>
<p style="margin-top:15px">© 2026 Sena Personalizados</p>
</div>

<a class="whatsapp-float" href="https://wa.me/5591984233046">WhatsApp</a>

<div class="modal" id="modal">
<div class="modal-content" id="modalContent"></div>
</div>

<div class="cart-panel" id="cartPanel">
<h3>Seu carrinho</h3>
<button onclick="toggleCart()" style="margin-bottom:10px;padding:6px 10px">Fechar</button>

<div id="cartItems"></div>

<h4 id="cartTotal"></h4>

<textarea id="orderNote" placeholder="Observação do pedido"></textarea>

<button class="add" onclick="finishOrder()">Finalizar no WhatsApp</button>
</div>
<h4 id="cartTotal"></h4>
<textarea id="orderNote" placeholder="Observação do pedido"></textarea>
<button class="add" onclick="finishOrder()">Finalizar no WhatsApp</button>
</div>

<script>

let orderNumber=1000

let products=[
{
id:1,
name:"Kit Dia das Mulheres",
desc:"1 foto + chaveiro personalizado",
price:15,
cat:"kit",
sales:18,
images:[
"https://picsum.photos/400?1",
"https://picsum.photos/400?2",
"https://picsum.photos/400?3"
]
},
{
id:2,
name:"Foto Personalizada",
desc:"Foto em papel fotográfico",
price:10,
cat:"foto",
sales:7,
images:[
"https://picsum.photos/400?4",
"https://picsum.photos/400?5"
]
}
]

let cart=[]

function renderProducts(list=products){
const container=document.getElementById("productList")
container.innerHTML=""

list.forEach(p=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.images[0]}">
<h4>${p.name}</h4>
<p class="desc">${p.desc}</p>
<div class="reviews">⭐⭐⭐⭐⭐</div>
<div class="sales">${p.sales} vendidos</div>
<p class="price">R$ ${p.price}</p>
<button class="add" onclick="event.stopPropagation();openProduct(${p.id})">Comprar</button>
</div>`
})
}

function renderBest(){
const best=[...products].sort((a,b)=>b.sales-a.sales).slice(0,5)

const container=document.getElementById("bestSellers")
container.innerHTML=""

best.forEach(p=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${p.id})">
<img src="${p.images[0]}">
<h4>${p.name}</h4>
<div class="sales">${p.sales} vendidos</div>
<p class="price">R$ ${p.price}</p>
</div>`
})
}

function openProduct(id){
const p=products.find(x=>x.id===id)

let thumbs=""
p.images.forEach(img=>{
thumbs+=`<img src="${img}" onclick="changeImage('${img}')">`
})

const content=document.getElementById("modalContent")

content.innerHTML=`
<img id="mainImage" class="modal-main" src="${p.images[0]}">

<div class="modal-gallery">${thumbs}</div>

<h3>${p.name}</h3>
<p>${p.desc}</p>

<p class="price">R$ ${p.price}</p>

<label>Quantidade</label>
<input type="number" id="qty" value="1" min="1">

<label>Observação</label>
<textarea id="note"></textarea>

<button class="add" onclick="addCart(${p.id})">Adicionar ao carrinho</button>
`


document.getElementById("modal").style.display="flex"
}

function changeImage(src){
document.getElementById("mainImage").src=src
}

function addCart(id){
const p=products.find(x=>x.id===id)
const qty=parseInt(document.getElementById("qty").value)
const note=document.getElementById("note").value

cart.push({product:p,qty,note})

updateCart()

document.getElementById("modal").style.display="none"
}

function updateCart(){
const items=document.getElementById("cartItems")
items.innerHTML=""

let total=0

cart.forEach((item,index)=>{
const sub=item.qty*item.product.price

total+=sub

items.innerHTML+=`
<div class="cart-item">
<b>${item.product.name}</b><br>
Qtd: 
<button onclick="changeQty(${index},-1)">-</button>
${item.qty}
<button onclick="changeQty(${index},1)">+</button><br>
Obs:${item.note||'-'}<br>
R$ ${sub}<br>
<button onclick="removeItem(${index})" style="margin-top:5px">Remover</button>
</div>`
})

document.getElementById("cartTotal").innerText="Total: R$ "+total

document.getElementById("cartCount").innerText=cart.length
}

function changeQty(index,delta){
cart[index].qty+=delta

if(cart[index].qty<=0){
cart.splice(index,1)
}

updateCart()
}

function removeItem(index){
cart.splice(index,1)
updateCart()
}

function toggleCart(){
const panel=document.getElementById("cartPanel")
panel.style.display=panel.style.display==='block'?'none':'block'
}

function finishOrder(){
orderNumber++

let text=`Pedido #${orderNumber}%0A`

cart.forEach(item=>{
text+=`- ${item.product.name} | Qtd:${item.qty} | Obs:${item.note}%0A`
})

text+="Observação geral: "+document.getElementById("orderNote").value

window.open("https://wa.me/5591984233046?text="+text)
}

function filterCategory(cat){
if(cat==='all')return renderProducts()
renderProducts(products.filter(p=>p.cat===cat))
}

function searchProduct(text){
text=text.toLowerCase()
renderProducts(products.filter(p=>p.name.toLowerCase().includes(text)))
}

function scrollToProducts(){
document.getElementById("products").scrollIntoView({behavior:'smooth'})
}

renderProducts()
renderBest()

</script>

</body>
</html>
