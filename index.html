<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sena Personalizados</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{--cor:#830064;--bg:#f4f4f6}

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial}
body{background:var(--bg)}

header{background:var(--cor);color:white;padding:15px;display:flex;justify-content:space-between}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}

.products{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}

.card{background:white;padding:15px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,.1)}
.card img{width:100%;border-radius:6px;margin-bottom:10px}
.price{color:var(--cor);font-weight:bold}

.cart{position:fixed;right:0;top:0;width:320px;height:100%;background:white;padding:20px;overflow:auto;display:none}

.admin{position:fixed;top:0;left:0;width:100%;height:100%;background:white;display:none;padding:20px;overflow:auto}

.admin input,.admin textarea,.admin select{width:100%;padding:8px;margin:5px 0}

.table div{border-bottom:1px solid #ddd;padding:8px}

.review{font-size:13px;color:#555;margin-top:5px}

</style>
</head>

<body>

<header>
<h2>Sena Personalizados</h2>
<div>
<button onclick="openAdmin()">Admin</button>
<button onclick="toggleCart()">Carrinho (<span id="cartCount">0</span>)</button>
</div>
</header>

<section class="products" id="productList"></section>

<div class="cart" id="cart"></div>

<div class="admin" id="admin">
<h2>Painel Administrativo</h2>

<h3>Dashboard</h3>
<canvas id="salesChart" height="120"></canvas>

<p>Total vendido: R$ <span id="totalSales"></span></p>
<p>Total pedidos: <span id="orders"></span></p>

<h3>Novo Produto</h3>
<input id="pname" placeholder="Nome">
<textarea id="pdesc" placeholder="Descrição"></textarea>
<input id="pprice" placeholder="Preço">
<input id="pimg" placeholder="URL da imagem">
<button onclick="addProduct()">Salvar</button>

<h3>Upload de foto</h3>
<input type="file" id="uploadImg">
<button onclick="uploadImage()">Carregar</button>
<p id="imgResult"></p>

<h3>Produtos</h3>
<div class="table" id="productTable"></div>

<h3>Pedidos</h3>
<div class="table" id="ordersTable"></div>

<button onclick="closeAdmin()">Fechar</button>
</div>

<script>

let products=JSON.parse(localStorage.getItem("products"))||[]
let cart=[]

let ordersDB=JSON.parse(localStorage.getItem("ordersDB"))||[]

function saveDB(){
localStorage.setItem("products",JSON.stringify(products))
localStorage.setItem("ordersDB",JSON.stringify(ordersDB))
}

function renderProducts(){
const list=document.getElementById("productList")
list.innerHTML=""

products.forEach(p=>{

let reviewsHTML=""

if(p.reviews){
p.reviews.forEach(r=>{
reviewsHTML+=`<div class="review">⭐ ${r}</div>`
})
}

list.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>${p.desc}</p>
<p class="price">R$ ${p.price}</p>
${reviewsHTML}
<button onclick="addCart(${p.id})">Adicionar</button>
<button onclick="reviewProduct(${p.id})">Avaliar</button>
</div>`

})
}

function addCart(id){
const p=products.find(x=>x.id===id)
cart.push(p)
updateCart()
}

function updateCart(){
const c=document.getElementById("cart")

c.innerHTML="<h3>Carrinho</h3>"

let total=0

cart.forEach((p,i)=>{

total+=p.price

c.innerHTML+=`<div>${p.name} <button onclick="removeItem(${i})">X</button></div>`
})

c.innerHTML+=`<h4>Total R$ ${total}</h4>`

c.innerHTML+=`<button onclick="finishOrder(${total})">Finalizar</button>`


document.getElementById("cartCount").innerText=cart.length
}

function removeItem(i){
cart.splice(i,1)
updateCart()
}

function toggleCart(){
const c=document.getElementById("cart")
c.style.display=c.style.display==='block'?'none':'block'
}

function finishOrder(total){

const order={
id:Date.now(),
items:cart,
total:total,
status:"Novo"
}

ordersDB.push(order)

saveDB()

cart=[]

updateCart()

alert("Pedido registrado")

}

function openAdmin(){
renderAdmin()
document.getElementById("admin").style.display="block"
}

function closeAdmin(){
document.getElementById("admin").style.display="none"
}

function addProduct(){

const product={
id:Date.now(),
name:document.getElementById("pname").value,
desc:document.getElementById("pdesc").value,
price:Number(document.getElementById("pprice").value),
img:document.getElementById("pimg").value,
reviews:[]
}

products.push(product)

saveDB()

renderProducts()
renderAdmin()

}

function deleteProduct(id){
products=products.filter(p=>p.id!==id)

saveDB()

renderProducts()
renderAdmin()
}

function renderAdmin(){

const table=document.getElementById("productTable")

const ordersTable=document.getElementById("ordersTable")

let totalSales=0

products.forEach(p=>{
})

ordersDB.forEach(o=>{
totalSales+=o.total
})


let tableHTML=""

products.forEach(p=>{

tableHTML+=`<div>${p.name} - R$ ${p.price} <button onclick="deleteProduct(${p.id})">Excluir</button></div>`

})


table.innerHTML=tableHTML


let ordersHTML=""

ordersDB.forEach(o=>{

ordersHTML+=`<div>
Pedido ${o.id} | R$ ${o.total}
<select onchange="updateStatus(${o.id},this.value)">
<option ${o.status==='Novo'?'selected':''}>Novo</option>
<option ${o.status==='Produção'?'selected':''}>Produção</option>
<option ${o.status==='Enviado'?'selected':''}>Enviado</option>
</select>
</div>`

})

ordersTable.innerHTML=ordersHTML


document.getElementById("totalSales").innerText=totalSales

document.getElementById("orders").innerText=ordersDB.length

renderChart()

}

function updateStatus(id,status){

const order=ordersDB.find(o=>o.id===id)

order.status=status

saveDB()

}

function reviewProduct(id){

const text=prompt("Digite sua avaliação")

const p=products.find(x=>x.id===id)

if(!p.reviews)p.reviews=[]

p.reviews.push(text)

saveDB()

renderProducts()

}

function uploadImage(){

const file=document.getElementById("uploadImg").files[0]

const reader=new FileReader()

reader.onload=function(e){

const img=e.target.result

localStorage.setItem("tempImage",img)

const url=img


document.getElementById("imgResult").innerText="Imagem pronta. Cole no campo URL"

document.getElementById("pimg").value=url

}

reader.readAsDataURL(file)

}

function renderChart(){

let totals=[]

ordersDB.forEach(o=>totals.push(o.total))

const ctx=document.getElementById('salesChart')

new Chart(ctx,{type:'bar',data:{labels:totals.map((_,i)=>"Pedido "+(i+1)),datasets:[{label:'Vendas',data:totals}]}})

}

renderProducts()

</script>

</body>
</html>
